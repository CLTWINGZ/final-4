apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  workspaces:
    - name: pipeline-workspace
  params:
    - name: image-name
      type: string
      default: "us.icr.io/tax-calculator/app:latest"
  tasks:
    - name: npminstall
      taskRef:
        name: npm
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: tests
      runAfter: [npminstall]
      taskRef:
        name: Jasmine
      workspaces:
        - name: source
          workspace: pipeline-workspace
    - name: build
      runAfter: [tests]
      taskRef:
        name: build
      params:
        - name: image
          value: $(params.image-name)
      workspaces:
        - name: source
          workspace: pipeline-workspace
