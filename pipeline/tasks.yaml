apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm
spec:
  workspaces:
    - name: source
  steps:
    - name: install
      image: node:18-slim
      workingDir: $(workspaces.source.path)
      script: |
        npm install
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: node:18-slim
      workingDir: $(workspaces.source.path)
      script: |
        npx jasmine
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build
spec:
  params:
    - name: image
      type: string
  workspaces:
    - name: source
  steps:
    - name: build-and-push
      image: quay.io/buildah/stable
      workingDir: $(workspaces.source.path)
      script: |
        buildah bud -t $(params.image) .
        buildah push $(params.image)
