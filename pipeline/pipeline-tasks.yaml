apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine-test
spec:
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: node:18-slim
      workingDir: $(workspaces.source.path)
      script: |
        npm install
        npm test
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-and-push
spec:
  params:
    - name: image
      description: Reference of the image buildah will produce.
  workspaces:
    - name: source
  steps:
    - name: build
      image: quay.io/buildah/stable:v1.23.3
      workingDir: $(workspaces.source.path)
      script: |
        buildah --storage-driver=vfs bud --format=docker -f Dockerfile -t $(params.image) .
        buildah --storage-driver=vfs push $(params.image)
      securityContext:
        privileged: true
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy-to-cloud
spec:
  params:
    - name: image
      description: The image to deploy.
    - name: app-name
      description: The name of the application.
  workspaces:
    - name: source
  steps:
    - name: deploy
      image: ibmcom/ibm-cloud-developer-tools-amd64
      script: |
        # In a real lab, you would authenticate and use 'ibmcloud' commands
        echo "Logging into IBM Cloud..."
        echo "Deploying $(params.image) as $(params.app-name)..."
        echo "Application successfully deployed to IBM Cloud!"
